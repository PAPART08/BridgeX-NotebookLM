<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decodr - NotebookLM Organizer</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
        }

        #decodr-sidepanel-preload {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(180deg, #1e1e1e 0%, #171717 100%);
            color: rgba(232, 234, 237, 0.82);
            font-family: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            z-index: 9999;
            transition: opacity 140ms ease;
        }

        #decodr-sidepanel-preload.ready {
            opacity: 0;
            pointer-events: none;
        }

        .decodr-preload-spinner {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(167, 139, 250, 0.2);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: decodr-preload-spin 0.8s linear infinite;
        }

        .decodr-preload-label {
            font-size: 13px;
            letter-spacing: 0.2px;
        }

        @keyframes decodr-preload-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
  <script type="module" crossorigin src="/assets/sidepanel-CVBAatdP.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/sidepanel-DZ9JBb3Q.css">
</head>

<body>
    <div id="decodr-sidepanel-preload" aria-hidden="true">
        <div class="decodr-preload-spinner"></div>
        <div class="decodr-preload-label">Loading Decodr...</div>
    </div>
    <div id="decodr-sidepanel-root"></div>
</body>

</html>
